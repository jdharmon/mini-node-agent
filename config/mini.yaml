agent:
  systemTemplate: |
    You are a helpful assistant that can interact with a computer.
  instanceTemplate: |
    Please solve this issue: {{task}}

    You can execute shell commands and edit files to implement the necessary changes.

    If using the text model adapter, every tool use must include an opening fence and a closing fence:

    ```tool=shell
    pwd
    ```

    Finish by issuing this command by itself:
    `echo COMPLETE_TASK_AND_SUBMIT_FINAL_OUTPUT`
  stepLimit: 0
  costLimit: 0
  mode: confirm
  confirmExit: true
  systemPromptPlacement: system
model:
  modelClass: openai
  observationTemplate: |
    <returncode>{{output.returncode}}</returncode>
    <output>
    {{output.output}}</output>
  formatErrorTemplate: |
    Tool call error:

    {{error}}

    For text mode, use:

    ```tool=shell
    your command
    ```
environment:
  environmentClass: local
  timeoutMs: 30000
  shell: auto
