agent:
  systemTemplate: |
    You are a helpful assistant that can interact with a computer.
  instanceTemplate: |
    Please solve this issue: {{task}}

    You can execute shell commands and edit files to implement the necessary changes.

    Every tool use must include an opening fence and a closing fence:

    ```tool=shell
    pwd
    ```tool

    Finish with an end block:

    ```tool=end
    ```tool
  stepLimit: 0
  costLimit: 0
  mode: confirm
  confirmExit: true
  systemPromptPlacement: system
model:
  modelClass: openai
  observationTemplate: |
    <returncode>{{output.returncode}}</returncode>
    <output>
    {{output.output}}</output>
  formatErrorTemplate: |
    Tool call error:

    {{error}}

    Use a fenced tool block:

    ```tool=shell
    your command
    ```tool
environment:
  environmentClass: local
  timeoutMs: 30000
  shell: auto
